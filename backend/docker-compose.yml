name: flowforge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_DB: flowforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge -d flowforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: flowforge
      MINIO_ROOT_PASSWORD: flowforge-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      APP_PORT: 4000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DATABASE_URL: postgresql+asyncpg://flowforge:flowforge@postgres:5432/flowforge
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: flowforge
      MINIO_SECRET_KEY: flowforge-secret
      MINIO_BUCKET: flowforge-uploads
      MINIO_SECURE: "false"
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      UPLOAD_MAX_FILES: "10"
      UPLOAD_MAX_FILE_BYTES: "10485760"
      DB_RESET_ON_START: "${DB_RESET_ON_START:-false}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-6}"
      ANTHROPIC_MAX_TOKENS: "${ANTHROPIC_MAX_TOKENS:-8192}"
      ANTHROPIC_TEMPERATURE: "${ANTHROPIC_TEMPERATURE:-0.9}"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
